# Server
server.port=8080
spring.application.name=esun-ecommerce

# DataSource
spring.datasource.url=jdbc:mysql://mysql:3306/esun_ecommerce?serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=esun
spring.datasource.password=test123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=esun-ecommerce-jwt-secret-key-256-bits-long-keep-it-safe
jwt.expiration=86400000

# Logging
logging.level.com.esun.ecommerce=DEBUG
logging.level.org.springframework.security=WARN
