services:

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: esun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: esun_ecommerce
      MYSQL_USER: esun
      MYSQL_PASSWORD: test123
    ports:
      - "3306:3306"
    volumes:
      - ./DB:/docker-entrypoint-initdb.d   # 自動依序執行
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "esun", "-ptest123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esun-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/esun_ecommerce?serverTimezone=Asia/Taipei&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: esun
      SPRING_DATASOURCE_PASSWORD: test123
    depends_on:
      mysql:
        condition: service_healthy

  # Vue 3
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: esun-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
